# Build Windows .exe installer when you push a version tag (e.g. v1.0.0).
# Requires GitHub secret: VITE_API_BASE_URL = your Railway Laravel URL (no /api suffix).

name: Desktop App Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Desktop-App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Desktop-App/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build:app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Desktop-App/release/*
          generate_release_notes: true
