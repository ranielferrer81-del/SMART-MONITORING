# Build Windows .exe installer when you push a version tag (e.g. v1.0.3).
# API URL is read from Desktop-App/public/api-base.json (same Laravel as the React web app).

name: Desktop App Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Desktop-App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Desktop-App/package-lock.json

      - name: Resolve API base URL
        id: api_base
        shell: pwsh
        run: |
          $json = Get-Content public/api-base.json -Raw | ConvertFrom-Json
          if (-not $json.apiBase) { throw 'public/api-base.json must contain apiBase' }
          "url=$($json.apiBase.TrimEnd('/'))" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          VITE_API_BASE_URL: ${{ steps.api_base.outputs.url }}
        run: npm run build:app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Desktop-App/release/*
          generate_release_notes: true
